<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{background:#0d1117;color:white;font-family:Arial;padding:20px;}
input,button{width:100%;padding:10px;margin-top:10px;}
.user{background:#161b22;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>
<body>

<h2>⚙️ Admin Panel</h2>

<button onclick="back()">⬅ retour</button>

<input id="u" placeholder="user">
<input id="p" placeholder="pass">
<button onclick="add()">Ajouter user</button>

<div id="list"></div>

<script>

if(localStorage.getItem("role")!=="admin"){
location.href="index.html";
}

let users=JSON.parse(localStorage.getItem("users")||"{}");

function add(){
users[u.value]=p.value;
localStorage.setItem("users",JSON.stringify(users));
render();
}

function del(u){
delete users[u];
localStorage.setItem("users",JSON.stringify(users));
render();
}

function render(){
let l=document.getElementById("list");
l.innerHTML="";

for(let u in users){
l.innerHTML+=`
<div class="user">
${u}
<button onclick="del('${u}')">X</button>
</div>`;
}
}

function back(){
location.href="dashboard.html";
}

render();

</script>

</body>
</html>
